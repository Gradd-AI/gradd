<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     style="overflow:hidden" role="img" aria-label="Gradd — Your AI-powered Leaving Cert Business tutor">
  <title>Gradd — Your AI-powered Leaving Cert Business tutor</title>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1B3D2F"/>

  <!-- Subtle grid texture -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#FAFAF7" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#FAFAF7" stroke-width="0.5" opacity="0.07"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#FAFAF7" stroke-width="0.5" opacity="0.05"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#FAFAF7" stroke-width="0.5" opacity="0.05"/>

  <!--
    Quarter-circle accent — anchored to top-right corner, bleeds off edge.
    cx=1200 cy=0 means only the bottom-left quarter is visible inside the viewport.
    Clearly a geometric brand element, not a floating UI circle.
    Two rings for depth.
  -->
  <circle cx="1200" cy="0" r="280" fill="#7EC8A4" opacity="0.18"/>
  <circle cx="1200" cy="0" r="180" fill="#7EC8A4" opacity="0.32"/>
  <circle cx="1200" cy="0" r="90"  fill="#7EC8A4" opacity="0.7"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#7EC8A4"/>

  <!-- Wordmark -->
  <text
    x="96"
    y="320"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="152"
    font-weight="700"
    fill="#FAFAF7"
    letter-spacing="-2"
  >Gradd</text>

  <!-- Tagline -->
  <text
    x="96"
    y="400"
    font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="400"
    fill="#FAFAF7"
    opacity="0.65"
  >Your AI-powered Leaving Cert Business tutor</text>

  <!-- Divider -->
  <line x1="96" y1="432" x2="520" y2="432" stroke="#7EC8A4" stroke-width="1" opacity="0.4"/>

  <!-- Domain -->
  <text
    x="96"
    y="570"
    font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="600"
    fill="#7EC8A4"
    letter-spacing="3"
  >GRADD.IE</text>
</svg>
