<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Gradd">
  <title>Gradd</title>
  <!-- Dark green background -->
  <rect width="512" height="512" rx="100" fill="#1B3D2F"/>
  <!-- White G — centered, unencumbered -->
  <text
    x="252"
    y="348"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="310"
    font-weight="700"
    fill="#FAFAF7"
    text-anchor="middle"
  >G</text>
  <!--
    Mint dot: top-right corner of the square, clearly inside the rounded rect
    but fully separated from the G letterform.
    This is a brand badge, not a period.
  -->
  <circle cx="412" cy="98" r="38" fill="#7EC8A4"/>
</svg>
