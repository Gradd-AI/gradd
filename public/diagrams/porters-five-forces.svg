<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" role="img" aria-label="Porter's Five Forces">
  <title>Porter's Five Forces</title>
  <style>
    text { font-family: 'Plus Jakarta Sans', Arial, sans-serif; }
    .box-title { font-size: 12px; font-weight: 700; }
    .box-body { font-size: 10px; }
    .arrow-label { font-size: 10px; fill: #888; font-style: italic; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1B3D2F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Centre: Industry Rivalry -->
  <rect x="175" y="160" width="170" height="120" rx="6" fill="#1B3D2F"/>
  <text x="260" y="190" text-anchor="middle" class="box-title" fill="#FAFAF7">Industry</text>
  <text x="260" y="210" text-anchor="middle" class="box-title" fill="#FAFAF7">Rivalry</text>
  <text x="260" y="234" text-anchor="middle" class="box-body" fill="#7EC8A4">Competition between</text>
  <text x="260" y="250" text-anchor="middle" class="box-body" fill="#7EC8A4">existing firms</text>
  <text x="260" y="268" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.7">Price wars · Advertising</text>

  <!-- Top: New Entrants -->
  <rect x="175" y="22" width="170" height="100" rx="6" fill="#2d6642"/>
  <text x="260" y="52" text-anchor="middle" class="box-title" fill="#FAFAF7">Threat of</text>
  <text x="260" y="70" text-anchor="middle" class="box-title" fill="#FAFAF7">New Entrants</text>
  <text x="260" y="92" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.85">Barriers to entry?</text>
  <text x="260" y="108" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.85">Capital, brand, regulation</text>

  <!-- Bottom: Substitutes -->
  <rect x="175" y="320" width="170" height="100" rx="6" fill="#2d6642"/>
  <text x="260" y="350" text-anchor="middle" class="box-title" fill="#FAFAF7">Threat of</text>
  <text x="260" y="368" text-anchor="middle" class="box-title" fill="#FAFAF7">Substitutes</text>
  <text x="260" y="390" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.85">Can buyers switch to</text>
  <text x="260" y="406" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.85">an alternative product?</text>

  <!-- Left: Supplier Power -->
  <rect x="22" y="180" width="130" height="100" rx="6" fill="#3d7a5a"/>
  <text x="87" y="208" text-anchor="middle" class="box-title" fill="#FAFAF7">Supplier</text>
  <text x="87" y="225" text-anchor="middle" class="box-title" fill="#FAFAF7">Power</text>
  <text x="87" y="247" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.85">Can suppliers raise</text>
  <text x="87" y="263" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.85">prices or cut supply?</text>

  <!-- Right: Buyer Power -->
  <rect x="368" y="180" width="130" height="100" rx="6" fill="#3d7a5a"/>
  <text x="433" y="208" text-anchor="middle" class="box-title" fill="#FAFAF7">Buyer</text>
  <text x="433" y="225" text-anchor="middle" class="box-title" fill="#FAFAF7">Power</text>
  <text x="433" y="247" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.85">Can buyers demand</text>
  <text x="433" y="263" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.85">lower prices or better</text>
  <text x="433" y="279" text-anchor="middle" class="box-body" fill="#FAFAF7" opacity="0.85">terms?</text>

  <!-- Arrows: Top ↕ Centre -->
  <line x1="260" y1="122" x2="260" y2="158" stroke="#1B3D2F" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Arrows: Bottom ↕ Centre -->
  <line x1="260" y1="282" x2="260" y2="318" stroke="#1B3D2F" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Arrows: Left ↔ Centre -->
  <line x1="152" y1="220" x2="173" y2="220" stroke="#1B3D2F" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Arrows: Right ↔ Centre -->
  <line x1="347" y1="220" x2="368" y2="220" stroke="#1B3D2F" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Bottom credit -->
  <text x="260" y="432" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" letter-spacing="0.5">LC Business — Porter's Five Forces (Michael Porter, 1979)</text>
</svg>
