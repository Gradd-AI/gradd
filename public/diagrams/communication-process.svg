<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" role="img" aria-label="Communication process">
  <title>Communication process</title>
  <style>
    text { font-family: 'Plus Jakarta Sans', Arial, sans-serif; }
    .box-title { font-size: 12px; font-weight: 700; fill: #FAFAF7; }
    .box-sub { font-size: 10px; fill: #FAFAF7; opacity: 0.8; }
    .flow-label { font-size: 10px; fill: #1B3D2F; font-weight: 600; }
    .barrier { font-size: 10px; fill: #e74c3c; font-style: italic; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1B3D2F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2980b9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Sender -->
  <rect x="22" y="100" width="100" height="70" rx="5" fill="#1B3D2F"/>
  <text x="72" y="128" text-anchor="middle" class="box-title">Sender</text>
  <text x="72" y="146" text-anchor="middle" class="box-sub">Encodes message</text>
  <text x="72" y="160" text-anchor="middle" class="box-sub">Has an idea</text>

  <!-- Message / Medium box -->
  <rect x="185" y="100" width="150" height="70" rx="5" fill="#2d6642"/>
  <text x="260" y="125" text-anchor="middle" class="box-title">Message &amp;</text>
  <text x="260" y="143" text-anchor="middle" class="box-title">Medium / Channel</text>
  <text x="260" y="161" text-anchor="middle" class="box-sub">Email · Letter · Meeting</text>

  <!-- Receiver -->
  <rect x="398" y="100" width="100" height="70" rx="5" fill="#1B3D2F"/>
  <text x="448" y="128" text-anchor="middle" class="box-title">Receiver</text>
  <text x="448" y="146" text-anchor="middle" class="box-sub">Decodes message</text>
  <text x="448" y="160" text-anchor="middle" class="box-sub">Interprets idea</text>

  <!-- Forward arrows -->
  <line x1="122" y1="135" x2="183" y2="135" stroke="#1B3D2F" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="335" y1="135" x2="396" y2="135" stroke="#1B3D2F" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="153" y="128" text-anchor="middle" class="flow-label">Encode</text>
  <text x="366" y="128" text-anchor="middle" class="flow-label">Decode</text>

  <!-- Feedback arc -->
  <path d="M 448 170 C 448 230 72 230 72 170" fill="none" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="260" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#2980b9">Feedback (response to sender)</text>

  <!-- Noise/barriers cloud -->
  <ellipse cx="260" cy="85" rx="70" ry="22" fill="none" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="260" y="90" text-anchor="middle" class="barrier">Noise / Barriers</text>

  <!-- Barrier examples -->
  <text x="260" y="286" text-anchor="middle" font-size="10" fill="#e74c3c">Language · Jargon · Distraction · Distance · Technology failure</text>

  <!-- Top heading -->
  <text x="260" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#1B3D2F">The Communication Process</text>
  <text x="260" y="50" text-anchor="middle" font-size="10" fill="#888">Shannon &amp; Weaver model — the basis for LC Business communication questions</text>

  <!-- Bottom credit -->
  <text x="260" y="312" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" letter-spacing="0.5">LC Business — Communication Process</text>
</svg>
