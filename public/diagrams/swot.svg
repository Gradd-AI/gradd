<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" role="img" aria-label="SWOT Analysis matrix">
  <title>SWOT Analysis</title>
  <style>
    text { font-family: 'Plus Jakarta Sans', Arial, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #FAFAF7; }
    .body { font-size: 11px; fill: #FAFAF7; opacity: 0.88; }
    .axis { font-size: 11px; fill: #1B3D2F; font-weight: 600; letter-spacing: 0.8px; }
    .centre { font-size: 12px; fill: #1B3D2F; font-weight: 700; }
  </style>

  <!-- Axis labels -->
  <text x="163" y="22" text-anchor="middle" class="axis">HELPFUL</text>
  <text x="357" y="22" text-anchor="middle" class="axis">HARMFUL</text>
  <text x="18" y="175" text-anchor="middle" class="axis" transform="rotate(-90 18 175)">INTERNAL</text>
  <text x="18" y="335" text-anchor="middle" class="axis" transform="rotate(-90 18 335)">EXTERNAL</text>

  <!-- S — Strengths -->
  <rect x="40" y="35" width="240" height="165" rx="4" fill="#1B3D2F"/>
  <text x="160" y="62" text-anchor="middle" class="title">Strengths</text>
  <text x="65" y="88" class="body">What does the business do well?</text>
  <text x="65" y="108" class="body">Advantages over competitors?</text>
  <text x="65" y="128" class="body">Unique resources or capabilities?</text>
  <text x="65" y="148" class="body">Strong brand, loyal customers?</text>
  <text x="65" y="168" class="body">Cost advantages or efficiencies?</text>

  <!-- W — Weaknesses -->
  <rect x="290" y="35" width="222" height="165" rx="4" fill="#2d5a42"/>
  <text x="401" y="62" text-anchor="middle" class="title">Weaknesses</text>
  <text x="310" y="88" class="body">What could be improved?</text>
  <text x="310" y="108" class="body">Gaps in skills or resources?</text>
  <text x="310" y="128" class="body">Areas where rivals do better?</text>
  <text x="310" y="148" class="body">Poor processes or systems?</text>
  <text x="310" y="168" class="body">Weak financial position?</text>

  <!-- O — Opportunities -->
  <rect x="40" y="210" width="240" height="165" rx="4" fill="#3d7a5a"/>
  <text x="160" y="237" text-anchor="middle" class="title">Opportunities</text>
  <text x="65" y="263" class="body">Market trends to exploit?</text>
  <text x="65" y="283" class="body">Technology changes available?</text>
  <text x="65" y="303" class="body">New markets to enter?</text>
  <text x="65" y="323" class="body">Competitor weaknesses to exploit?</text>
  <text x="65" y="343" class="body">Changes in regulation?</text>

  <!-- T — Threats -->
  <rect x="290" y="210" width="222" height="165" rx="4" fill="#5a8f70"/>
  <text x="401" y="237" text-anchor="middle" class="title">Threats</text>
  <text x="310" y="263" class="body">Competitor actions?</text>
  <text x="310" y="283" class="body">Changing customer needs?</text>
  <text x="310" y="303" class="body">Economic downturns?</text>
  <text x="310" y="323" class="body">New legislation or taxes?</text>
  <text x="310" y="343" class="body">Supply chain disruptions?</text>

  <!-- Centre cross -->
  <line x1="40" y1="202" x2="512" y2="202" stroke="#FAFAF7" stroke-width="3" opacity="0.3"/>
  <line x1="282" y1="35" x2="282" y2="375" stroke="#FAFAF7" stroke-width="3" opacity="0.3"/>

  <!-- Centre label -->
  <rect x="252" y="182" width="60" height="40" rx="4" fill="#FAFAF7"/>
  <text x="282" y="207" text-anchor="middle" class="centre">SWOT</text>

  <!-- Corner labels -->
  <text x="55" y="52" font-family="Arial" font-size="22" font-weight="900" fill="#FAFAF7" opacity="0.2">S</text>
  <text x="300" y="52" font-family="Arial" font-size="22" font-weight="900" fill="#FAFAF7" opacity="0.2">W</text>
  <text x="55" y="227" font-family="Arial" font-size="22" font-weight="900" fill="#FAFAF7" opacity="0.2">O</text>
  <text x="300" y="227" font-family="Arial" font-size="22" font-weight="900" fill="#FAFAF7" opacity="0.2">T</text>

  <!-- Bottom label -->
  <text x="282" y="408" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" letter-spacing="0.5">LC Business — SWOT Analysis Framework</text>
</svg>
