<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" role="img" aria-label="Product Life Cycle">
  <title>Product Life Cycle</title>
  <style>
    text { font-family: 'Plus Jakarta Sans', Arial, sans-serif; }
    .stage { font-size: 12px; font-weight: 700; }
    .sub { font-size: 10px; fill: #666; }
    .axis { font-size: 11px; fill: #444; font-weight: 600; }
  </style>

  <!-- Axes -->
  <line x1="60" y1="300" x2="500" y2="300" stroke="#333" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="60" x2="60" y2="300" stroke="#333" stroke-width="1.5" opacity="0.4"/>
  <polygon points="500,296 508,300 500,304" fill="#333" opacity="0.4"/>
  <polygon points="56,60 60,52 64,60" fill="#333" opacity="0.4"/>

  <!-- Axis labels -->
  <text x="510" y="304" class="axis">Time</text>
  <text x="25" y="185" class="axis" transform="rotate(-90 25 185)" text-anchor="middle">Sales / Profit (€)</text>

  <!-- Zero profit line (dashed) -->
  <line x1="60" y1="210" x2="500" y2="210" stroke="#aaa" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="54" y="214" text-anchor="end" class="sub">0</text>

  <!-- Sales curve — smooth S + decline -->
  <!-- Development: flat near zero, Introduction: slow rise, Growth: steep, Maturity: plateau, Decline: fall -->
  <path d="M 60 295 C 95 294 110 290 130 280 C 150 268 160 245 195 195 C 225 150 255 115 290 105 C 320 97 340 100 370 108 C 395 115 410 130 440 175 C 460 205 475 245 500 280"
        fill="none" stroke="#1B3D2F" stroke-width="2.5"/>

  <!-- Profit curve — rises later, lower peak, turns negative at decline -->
  <path d="M 60 295 C 90 295 120 295 140 295 C 155 295 165 290 185 270 C 210 242 238 200 268 178 C 295 160 315 158 348 168 C 375 177 395 200 420 235 C 440 262 465 280 500 295"
        fill="none" stroke="#7EC8A4" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Stage dividers -->
  <line x1="130" y1="70" x2="130" y2="300" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="210" y1="70" x2="210" y2="300" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="370" y1="70" x2="370" y2="300" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Stage labels -->
  <text x="95" y="82" text-anchor="middle" class="stage" fill="#888">Development</text>
  <text x="170" y="82" text-anchor="middle" class="stage" fill="#e67e22">Introduction</text>
  <text x="290" y="82" text-anchor="middle" class="stage" fill="#1B3D2F">Growth</text>
  <text x="370" y="68" text-anchor="middle" class="stage" fill="#2980b9">Maturity</text>
  <text x="435" y="82" text-anchor="middle" class="stage" fill="#e74c3c">Decline</text>

  <!-- Stage background bands -->
  <rect x="60" y="90" width="70" height="210" fill="#888" opacity="0.04" rx="2"/>
  <rect x="130" y="90" width="80" height="210" fill="#e67e22" opacity="0.05" rx="2"/>
  <rect x="210" y="90" width="160" height="210" fill="#1B3D2F" opacity="0.05" rx="2"/>
  <rect x="370" y="90" width="0" height="210" fill="#2980b9" opacity="0.05" rx="2"/>
  <rect x="370" y="90" width="130" height="210" fill="#e74c3c" opacity="0.05" rx="2"/>

  <!-- Legend -->
  <line x1="70" y1="338" x2="100" y2="338" stroke="#1B3D2F" stroke-width="2.5"/>
  <text x="106" y="342" font-size="11" fill="#444" font-family="Arial">Sales revenue</text>
  <line x1="200" y1="338" x2="230" y2="338" stroke="#7EC8A4" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="236" y="342" font-size="11" fill="#444" font-family="Arial">Profit</text>

  <!-- Bottom credit -->
  <text x="282" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" letter-spacing="0.5">LC Business — Product Life Cycle</text>
</svg>
