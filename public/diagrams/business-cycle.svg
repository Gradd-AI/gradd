<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" role="img" aria-label="Business cycle">
  <title>Business cycle</title>
  <style>
    text { font-family: 'Plus Jakarta Sans', Arial, sans-serif; }
    .stage { font-size: 12px; font-weight: 700; }
    .sub { font-size: 10px; fill: #555; }
    .axis { font-size: 11px; fill: #444; font-weight: 600; }
  </style>

  <!-- Axes -->
  <line x1="50" y1="270" x2="490" y2="270" stroke="#888" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="60" x2="50" y2="270" stroke="#888" stroke-width="1.2" opacity="0.5"/>
  <polygon points="490,266 498,270 490,274" fill="#888" opacity="0.5"/>
  <polygon points="46,60 50,52 54,60" fill="#888" opacity="0.5"/>

  <!-- Axis labels -->
  <text x="500" y="274" class="axis">Time</text>
  <text x="20" y="170" class="axis" transform="rotate(-90 20 170)" text-anchor="middle">GDP / Economic Activity</text>

  <!-- Trend line (long-run growth) -->
  <line x1="50" y1="240" x2="490" y2="120" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Business cycle wave -->
  <path d="M 50 200 C 90 200 100 120 140 100 C 180 80 190 170 230 180 C 270 190 280 80 330 70 C 370 62 380 160 420 175 C 455 188 465 120 490 110"
        fill="none" stroke="#1B3D2F" stroke-width="2.5"/>

  <!-- Stage labels and markers -->
  <!-- Peak 1 at ~x=140 y=100 -->
  <circle cx="140" cy="100" r="4" fill="#e74c3c"/>
  <text x="140" y="88" text-anchor="middle" class="stage" fill="#e74c3c">Boom</text>
  <text x="140" y="300" text-anchor="middle" class="sub">High output</text>
  <text x="140" y="314" text-anchor="middle" class="sub">Low unemployment</text>
  <line x1="140" y1="104" x2="140" y2="270" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Trough at ~x=230 y=180 -->
  <circle cx="230" cy="180" r="4" fill="#2980b9"/>
  <text x="230" y="196" text-anchor="middle" class="stage" fill="#2980b9">Recession</text>
  <text x="230" y="300" text-anchor="middle" class="sub">Falling output</text>
  <text x="230" y="314" text-anchor="middle" class="sub">Rising unemployment</text>
  <line x1="230" y1="176" x2="230" y2="270" stroke="#2980b9" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Trough at ~x=330 y=70 -->
  <circle cx="330" cy="70" r="4" fill="#e74c3c"/>
  <text x="330" y="58" text-anchor="middle" class="stage" fill="#e74c3c">Boom</text>
  <line x1="330" y1="74" x2="330" y2="270" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Recovery area -->
  <text x="178" y="196" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Trough</text>

  <!-- Legend -->
  <line x1="58" y1="52" x2="88" y2="52" stroke="#1B3D2F" stroke-width="2.5"/>
  <text x="94" y="56" font-size="10" fill="#444" font-family="Arial">GDP</text>
  <line x1="130" y1="52" x2="160" y2="52" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="166" y="56" font-size="10" fill="#444" font-family="Arial">Long-run trend</text>

  <!-- Bottom credit -->
  <text x="270" y="332" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" letter-spacing="0.5">LC Business — Business / Economic Cycle</text>
</svg>
