<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="Chain of distribution">
  <title>Chain of distribution</title>
  <style>
    text { font-family: 'Plus Jakarta Sans', Arial, sans-serif; }
    .box-title { font-size: 12px; font-weight: 700; fill: #FAFAF7; }
    .box-sub { font-size: 10px; fill: #FAFAF7; opacity: 0.8; }
    .route-label { font-size: 10px; fill: #555; font-style: italic; }
    .arrow-label { font-size: 10px; fill: #888; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1B3D2F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="260" y="22" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#1B3D2F">Channels of Distribution</text>

  <!-- Producer box -->
  <rect x="195" y="38" width="130" height="52" rx="5" fill="#1B3D2F"/>
  <text x="260" y="61" text-anchor="middle" class="box-title">Producer /</text>
  <text x="260" y="79" text-anchor="middle" class="box-title">Manufacturer</text>

  <!-- Wholesaler box -->
  <rect x="195" y="145" width="130" height="48" rx="5" fill="#2d6642"/>
  <text x="260" y="163" text-anchor="middle" class="box-title">Wholesaler</text>
  <text x="260" y="181" text-anchor="middle" class="box-sub">Bulk-breaks, stores</text>

  <!-- Retailer box -->
  <rect x="195" y="245" width="130" height="48" rx="5" fill="#3d7a5a"/>
  <text x="260" y="263" text-anchor="middle" class="box-title">Retailer</text>
  <text x="260" y="281" text-anchor="middle" class="box-sub">Sells to end consumer</text>

  <!-- Consumer box -->
  <rect x="195" y="315" width="130" height="34" rx="5" fill="#7EC8A4"/>
  <text x="260" y="337" text-anchor="middle" font-size="12" font-weight="700" fill="#1B3D2F">Consumer</text>

  <!-- Channel 1: Producer → Consumer (direct) -->
  <line x1="155" y1="64" x2="75" y2="64" stroke="#1B3D2F" stroke-width="1.2" opacity="0.4"/>
  <line x1="75" y1="64" x2="75" y2="332" stroke="#1B3D2F" stroke-width="1.2" opacity="0.4" marker-end="url(#arr)"/>
  <line x1="75" y1="332" x2="195" y2="332" stroke="#1B3D2F" stroke-width="1.2" opacity="0.4"/>
  <text x="38" y="200" text-anchor="middle" class="route-label" transform="rotate(-90 38 200)">Channel 1 — Direct</text>

  <!-- Channel 2: Producer → Retailer → Consumer -->
  <line x1="325" y1="64" x2="395" y2="64" stroke="#2980b9" stroke-width="1.2" opacity="0.5"/>
  <line x1="395" y1="64" x2="395" y2="261" stroke="#2980b9" stroke-width="1.2" opacity="0.5"/>
  <line x1="395" y1="261" x2="325" y2="261" stroke="#2980b9" stroke-width="1.2" opacity="0.5" marker-end="url(#arr)"/>
  <line x1="395" y1="280" x2="395" y2="332" stroke="#2980b9" stroke-width="1.2" opacity="0.5"/>
  <line x1="395" y1="332" x2="325" y2="332" stroke="#2980b9" stroke-width="1.2" opacity="0.5" marker-end="url(#arr)"/>
  <text x="438" y="200" text-anchor="middle" class="route-label" transform="rotate(90 438 200)">Channel 2 — Short</text>

  <!-- Channel 3: Full chain (centre arrows) -->
  <line x1="260" y1="90" x2="260" y2="143" stroke="#1B3D2F" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="260" y1="193" x2="260" y2="243" stroke="#1B3D2F" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="260" y1="293" x2="260" y2="313" stroke="#1B3D2F" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Centre route label -->
  <text x="270" y="120" class="route-label" fill="#1B3D2F">Traditional</text>
  <text x="270" y="222" class="route-label" fill="#1B3D2F">channel</text>

  <!-- Bottom credit -->
  <text x="260" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" letter-spacing="0.5">LC Business — Chain of Distribution</text>
</svg>
