<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" role="img" aria-label="Supply and demand curves">
  <title>Supply and demand curves</title>
  <style>
    text { font-family: 'Plus Jakarta Sans', Arial, sans-serif; }
    .label { font-size: 11px; fill: #333; }
    .axis-label { font-size: 11px; font-weight: 600; fill: #444; }
    .curve-label { font-size: 13px; font-weight: 700; }
    .eq-label { font-size: 11px; fill: #1B3D2F; font-weight: 600; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="60" y1="310" x2="490" y2="310" stroke="#555" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="40" x2="60" y2="310" stroke="#555" stroke-width="1.5" opacity="0.5"/>
  <polygon points="490,306 498,310 490,314" fill="#555" opacity="0.5"/>
  <polygon points="56,40 60,32 64,40" fill="#555" opacity="0.5"/>

  <!-- Axis labels -->
  <text x="500" y="314" class="axis-label">Q</text>
  <text x="30" y="180" class="axis-label" transform="rotate(-90 30 180)" text-anchor="middle">Price (€)</text>

  <!-- Demand curve — downward sloping -->
  <line x1="85" y1="80" x2="460" y2="290" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="465" y="285" class="curve-label" fill="#e74c3c">D</text>

  <!-- Supply curve — upward sloping -->
  <line x1="85" y1="290" x2="460" y2="80" stroke="#2980b9" stroke-width="2.5"/>
  <text x="465" y="85" class="curve-label" fill="#2980b9">S</text>

  <!-- Equilibrium point — intersection -->
  <!-- D: y = 80 + (x-85)*(210/375) = 80 + (x-85)*0.56 -->
  <!-- S: y = 290 - (x-85)*(210/375) = 290 - (x-85)*0.56 -->
  <!-- 80 + (x-85)*0.56 = 290 - (x-85)*0.56 → 2*(x-85)*0.56 = 210 → (x-85) = 187.5 → x = 272.5 -->
  <!-- y = 80 + 187.5*0.56 = 80 + 105 = 185 -->
  <circle cx="272" cy="185" r="5" fill="#1B3D2F"/>

  <!-- Equilibrium dashed lines -->
  <line x1="60" y1="185" x2="272" y2="185" stroke="#1B3D2F" stroke-width="1" stroke-dasharray="5,4" opacity="0.6"/>
  <line x1="272" y1="185" x2="272" y2="310" stroke="#1B3D2F" stroke-width="1" stroke-dasharray="5,4" opacity="0.6"/>

  <!-- Equilibrium labels -->
  <text x="50" y="188" text-anchor="end" class="eq-label">P*</text>
  <text x="272" y="324" text-anchor="middle" class="eq-label">Q*</text>
  <text x="278" y="178" class="eq-label">Equilibrium</text>

  <!-- Surplus / shortage labels -->
  <text x="140" y="145" class="label" fill="#e74c3c" font-style="italic">Surplus if P above P*</text>
  <text x="140" y="262" class="label" fill="#2980b9" font-style="italic">Shortage if P below P*</text>

  <!-- Law of demand/supply reminders -->
  <text x="80" y="336" class="label" fill="#e74c3c">↑ Price → ↓ Quantity demanded</text>
  <text x="80" y="356" class="label" fill="#2980b9">↑ Price → ↑ Quantity supplied</text>

  <!-- Bottom credit -->
  <text x="282" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" letter-spacing="0.5">LC Business — Supply &amp; Demand</text>
</svg>
